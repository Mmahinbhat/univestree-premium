<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Univestree</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<nav>

<div class="logo">
Univestree
</div>

<ul>

<li>
<a href="../index.html">
Home
</a>
</li>

<li>
<a href="universities.html">
Universities
</a>
</li>

<li>
<a href="courses.html">
Courses
</a>
</li>

</ul>

<div class="nav-buttons">

<button
class="btn btn-primary"
onclick="window.location.href='signup.html'">

Create Account

</button>

</div>

</nav>

<section class="section">

<div
style="
max-width:450px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
">

<h1 style="margin-bottom:10px;">
Welcome Back
</h1>

<p
style="
color:#666;
margin-bottom:30px;
">
Login to continue your admission journey
</p>

<input
id="login-email"
type="email"
placeholder="Enter your email"
style="
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
">

<input
id="login-password"
type="password"
placeholder="Enter your password"
style="
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
">

<button
onclick="loginUser()"
class="btn btn-primary"
style="
width:100%;
padding:15px;
font-size:16px;
">

Login

</button>

<p
style="
margin-top:20px;
text-align:center;
">

Don't have an account?

<a
href="signup.html"
style="
color:#2563EB;
font-weight:600;
text-decoration:none;
">

Signup

</a>

</p>

</div>

</section>

<script type="module" src="../js/firebase.js"></script>

</body>
</html>
