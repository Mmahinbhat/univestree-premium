<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — Univestree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563EB;--primary-dark:#1D4ED8;--bg:#F8F7F4;--card:#FFFFFF;--text:#111827;--muted:#6B7280;--border:#E5E7EB;--radius:18px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,247,244,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:68px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.45rem;font-weight:800;background:linear-gradient(135deg,var(--primary),#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;}
.nav-back{font-size:0.9rem;color:var(--muted);cursor:pointer;font-weight:600;}
.nav-back:hover{color:var(--primary);}
.page{padding:100px 5% 60px;}
.page-header{margin-bottom:2rem;}
.page-header h1{font-size:2.2rem;font-weight:800;margin-bottom:0.5rem;}
.page-header p{color:var(--muted);}
.search-bar{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.search-bar input,.search-bar select{padding:0.75rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:0.95rem;outline:none;background:#fff;}
.search-bar input{flex:1;min-width:200px;}
.search-bar input:focus,.search-bar select:focus{border-color:var(--primary);}
.search-bar button{padding:0.75rem 1.5rem;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.search-bar button:hover{background:var(--primary-dark);}
.filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-chip{padding:0.4rem 1rem;border:1.5px solid var(--border);border-radius:50px;font-size:0.85rem;font-weight:600;cursor:pointer;background:#fff;transition:all .2s;}
.filter-chip.active,.filter-chip:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.results-count{font-size:0.85rem;color:var(--muted);margin-bottom:1rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;transition:box-shadow .2s;}
.card:hover{box-shadow:0 8px 32px rgba(37,99,235,0.12);}
.card-tags{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;}
.tag{padding:0.25rem 0.75rem;border-radius:50px;font-size:0.75rem;font-weight:700;}
.tag-blue{background:#EFF6FF;color:#2563EB;}
.tag-green{background:#F0FDF4;color:#16A34A;}
.tag-purple{background:#F5F3FF;color:#7C3AED;}
.tag-amber{background:#FFFBEB;color:#D97706;}
.card h3{font-size:1.05rem;font-weight:700;margin-bottom:0.4rem;}
.card .uni{font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;}
.card .desc{font-size:0.85rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.card-meta{font-size:0.8rem;color:var(--muted);}
.apply-btn{padding:0.5rem 1.1rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;font-family:inherit;}
.apply-btn:hover{background:var(--primary-dark);}
.empty{text-align:center;padding:4rem;color:var(--muted);}
.empty h3{font-size:1.2rem;margin-bottom:0.5rem;}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="window.location.href='index.html'">Univestree</div>
  <div class="nav-back" onclick="window.location.href='index.html'">← Back to Home</div>
</nav>
<div class="page">
  <div class="page-header">
    <h1>📚 Browse Courses</h1>
    <p>Explore programs across top universities worldwide</p>
  </div>
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Search courses, fields, universities..." onkeydown="if(event.key==='Enter')doSearch()">
    <select id="levelFilter" onchange="doSearch()">
      <option value="">All Levels</option>
      <option value="UG">Undergraduate</option>
      <option value="Masters">Masters</option>
      <option value="PhD">PhD</option>
    </select>
    <button onclick="doSearch()">🔍 Search</button>
  </div>
  <div class="filters">
    <span class="filter-chip active" onclick="filterField('')">All Fields</span>
    <span class="filter-chip" onclick="filterField('Computer Science')">💻 Computer Science</span>
    <span class="filter-chip" onclick="filterField('Engineering')">⚙️ Engineering</span>
    <span class="filter-chip" onclick="filterField('Business')">💼 Business</span>
    <span class="filter-chip" onclick="filterField('Medicine')">🏥 Medicine</span>
    <span class="filter-chip" onclick="filterField('Law')">⚖️ Law</span>
    <span class="filter-chip" onclick="filterField('Science')">🔬 Science</span>
    <span class="filter-chip" onclick="filterField('Arts')">🎨 Arts</span>
  </div>
  <div class="results-count" id="resultsCount"></div>
  <div class="grid" id="grid"></div>
</div>
<script>
const API = 'https://univestree-backend.vercel.app/api/courses';
let allCourses = [];
const levelColors = {UG:'tag-blue', Masters:'tag-green', PhD:'tag-purple'};

async function load(query='', field='') {
  document.getElementById('grid').innerHTML = '<div class="empty"><h3>Loading...</h3></div>';
  let url = API + '/search?';
  if (query) url += 'query=' + encodeURIComponent(query) + '&';
  if (field) url += 'field=' + encodeURIComponent(field);
  const res = await fetch(url);
  allCourses = await res.json();
  render(allCourses);
}

function render(courses) {
  const level = document.getElementById('levelFilter').value;
  const filtered = level ? courses.filter(c => c.level === level) : courses;
  document.getElementById('resultsCount').textContent = filtered.length + ' course' + (filtered.length !== 1 ? 's' : '') + ' found';
  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="empty"><h3>No courses found</h3><p>Try a different search or filter</p></div>';
    return;
  }
  document.getElementById('grid').innerHTML = filtered.map(c => `
    <div class="card">
      <div class="card-tags">
        <span class="tag ${levelColors[c.level]||'tag-blue'}">${c.level}</span>
        <span class="tag tag-amber">${c.field}</span>
      </div>
      <h3>${c.name}</h3>
      <div class="uni">🏛️ ${c.university} · ${c.country}</div>
      <div class="desc">${c.description}</div>
      <div class="card-footer">
        <div class="card-meta">⏱ ${c.duration} · $${c.tuition?.toLocaleString()}/yr</div>
        <button class="apply-btn">Apply Now</button>
      </div>
    </div>
  `).join('');
}

function doSearch() {
  const q = document.getElementById('searchInput').value;
  const field = document.querySelector('.filter-chip.active')?.textContent.replace(/[💻⚙️💼🏥⚖️🔬🎨]/gu,'').trim();
  load(q, field === 'All Fields' ? '' : field || '');
}

function filterField(field) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  const q = document.getElementById('searchInput').value;
  load(q, field);
}

// Load from URL param
const urlQ = new URLSearchParams(location.search).get('query') || '';
if (urlQ) document.getElementById('searchInput').value = urlQ;
load(urlQ);
</script>
</body>
</html>
