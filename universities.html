<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Universities — Univestree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB; --primary-dark: #1D4ED8;
    --accent3: #8B5CF6; --bg: #F8F7F4; --card: #FFFFFF;
    --text: #111827; --muted: #6B7280; --border: #E5E7EB;
    --radius: 18px; --shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(248,247,244,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 68px;
  }
  .logo {
    font-size: 1.45rem; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-back { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
  .page-wrap { padding: 100px 5% 60px; max-width: 1300px; margin: 0 auto; }
  h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.3rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; }
  .search-row {
    display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap;
    background: var(--card); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow);
  }
  .search-row input {
    flex: 1; min-width: 200px; padding: 12px 16px;
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'Sora', sans-serif; font-size: 0.95rem; outline: none;
  }
  .search-row input:focus { border-color: var(--primary); }
  .search-row select {
    padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
    font-family: 'Sora', sans-serif; font-size: 0.95rem; background: white; outline: none;
  }
  .search-btn {
    padding: 12px 24px; background: var(--primary); color: white;
    border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1rem;
    font-family: 'Sora', sans-serif;
  }
  .search-btn:hover { background: var(--primary-dark); }
  .results-count { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.2rem; }
  .unis-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
  }
  .uni-card {
    background: var(--card); border-radius: var(--radius); padding: 22px;
    box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .uni-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(37,99,235,0.13); }
  .uni-header { display: flex; align-items: center; gap: 14px; }
  .uni-logo-wrap {
    width: 52px; height: 52px; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); background: white; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .uni-logo-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .uni-logo-fallback {
    width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 1.3rem; color: white;
  }
  .uni-name { font-weight: 700; font-size: 0.98rem; line-height: 1.3; }
  .uni-location { color: var(--muted); font-size: 0.82rem; }
  .uni-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-chip {
    background: #F3F4F6; border-radius: 8px; padding: 4px 10px;
    font-size: 0.76rem; font-weight: 600; color: var(--text);
  }
  .programs { display: flex; gap: 5px; flex-wrap: wrap; }
  .prog-tag {
    background: #EFF6FF; color: var(--primary); border-radius: 6px;
    padding: 3px 8px; font-size: 0.73rem; font-weight: 500;
  }
  .view-btn {
    margin-top: auto; padding: 10px; background: var(--primary); color: white;
    border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 0.88rem; width: 100%;
  }
  .view-btn:hover { background: var(--primary-dark); }
  .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 1.1rem; }
  .no-results { text-align: center; padding: 80px; color: var(--muted); }
  .no-results h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>
<nav>
  <div class="logo">🌳 Univestree</div>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>
<div class="page-wrap">
  <h1>Find Your University</h1>
  <p class="subtitle">Search across 96+ top universities worldwide</p>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search university, course, country...">
    <select id="countryFilter">
      <option value="">🌍 All Countries</option>
      <option>USA</option><option>UK</option><option>Canada</option>
      <option>Australia</option><option>Germany</option><option>Switzerland</option>
      <option>Singapore</option><option>Japan</option><option>China</option>
      <option>South Korea</option><option>India</option><option>Pakistan</option>
      <option>France</option><option>Netherlands</option><option>Sweden</option>
      <option>Italy</option><option>Spain</option><option>Russia</option>
      <option>Hong Kong</option><option>UAE</option><option>Saudi Arabia</option>
      <option>Brazil</option><option>Mexico</option><option>South Africa</option>
      <option>Turkey</option><option>Malaysia</option><option>Taiwan</option>
      <option>Ireland</option><option>Denmark</option><option>Finland</option>
      <option>Norway</option><option>Belgium</option><option>New Zealand</option>
      <option>Argentina</option><option>Ghana</option><option>Kenya</option><option>Egypt</option>
    </select>
    <button class="search-btn" onclick="fetchAndDisplay()">🔍 Search</button>
  </div>
  <div class="results-count" id="resultsCount"></div>
  <div class="unis-grid" id="universitiesContainer">
    <div class="loading">Loading universities...</div>
  </div>
</div>
<script>
const API = 'https://univestree-backend.vercel.app/api/universities';
const colors = ['linear-gradient(135deg,#1D4ED8,#3B82F6)','linear-gradient(135deg,#7C3AED,#8B5CF6)','linear-gradient(135deg,#059669,#34D399)','linear-gradient(135deg,#D97706,#F59E0B)','linear-gradient(135deg,#DC2626,#F87171)','linear-gradient(135deg,#0891B2,#22D3EE)'];

const params = new URLSearchParams(window.location.search);
if (params.get('query')) document.getElementById('searchInput').value = params.get('query');
if (params.get('country')) document.getElementById('countryFilter').value = params.get('country');

function logoHTML(uni, i) {
  if (uni.logo) {
    return `<div class="uni-logo-wrap">
      <img src="${uni.logo}" alt="${uni.name}" 
        onerror="this.parentElement.outerHTML='<div class=\\"uni-logo-fallback\\" style=\\"background:${colors[i % colors.length]}\\">${uni.name.charAt(0)}</div>'"
      >
    </div>`;
  }
  return `<div class="uni-logo-fallback" style="background:${colors[i % colors.length]}">${uni.name.charAt(0)}</div>`;
}

async function fetchAndDisplay() {
  const query = document.getElementById('searchInput').value.trim();
  const country = document.getElementById('countryFilter').value;
  const container = document.getElementById('universitiesContainer');
  const countEl = document.getElementById('resultsCount');
  container.innerHTML = '<div class="loading">Searching...</div>';
  let url = `${API}/search?`;
  if (query) url += `query=${encodeURIComponent(query)}&`;
  if (country) url += `country=${encodeURIComponent(country)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const unis = Array.isArray(data) ? data : [];
    countEl.textContent = `${unis.length} universit${unis.length === 1 ? 'y' : 'ies'} found`;
    if (unis.length === 0) {
      container.innerHTML = '<div class="no-results"><h3>No universities found</h3><p>Try a different search or country</p></div>';
      return;
    }
    container.innerHTML = unis.map((u, i) => `
      <div class="uni-card">
        <div class="uni-header">
          ${logoHTML(u, i)}
          <div>
            <div class="uni-name">${u.name}</div>
            <div class="uni-location">📍 ${u.city ? u.city + ', ' : ''}${u.country}</div>
          </div>
        </div>
        <div class="uni-stats">
          <span class="stat-chip">🏆 #${u.ranking}</span>
          <span class="stat-chip">✅ ${u.acceptanceRate}%</span>
          ${u.tuition === 0 ? '<span class="stat-chip">🆓 Free</span>' : `<span class="stat-chip">💰 $${u.tuition?.toLocaleString()}/yr</span>`}
        </div>
        <div class="programs">${(u.programs || []).slice(0,3).map(p => `<span class="prog-tag">${p}</span>`).join('')}</div>
        <button class="view-btn" onclick="window.location.href='university-details.html?id=${u.id}'">View Details →</button>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div class="no-results"><h3>Error loading results</h3><p>Please try again</p></div>';
    console.error(e);
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchAndDisplay(); });
document.getElementById('countryFilter').addEventListener('change', fetchAndDisplay);
fetchAndDisplay();
</script>
</body>
</html>
