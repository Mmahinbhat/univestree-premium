<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Details — Univestree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #EFF6FF;
    --accent: #8B5CF6; --bg: #F0F4FF; --card: #FFFFFF;
    --text: #111827; --muted: #6B7280; --border: #E5E7EB;
    --green: #059669; --amber: #D97706; --red: #DC2626;
    --radius: 16px; --shadow: 0 2px 20px rgba(37,99,235,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.96); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .logo { font-size: 1.3rem; font-weight: 800; color: var(--primary); text-decoration: none; }
  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .nav-back { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.85rem; }
  .btn-track-nav {
    padding: 8px 18px; background: var(--primary); color: white;
    border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 0.82rem;
    display: flex; align-items: center; gap: 6px; text-decoration: none;
  }

  /* HERO */
  .hero {
    margin-top: 64px;
    background: linear-gradient(135deg, #1e3a8a 0%, #1D4ED8 45%, #7C3AED 100%);
    padding: 48px 5% 0;
    color: white; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 80% 50%, rgba(139,92,246,0.3) 0%, transparent 60%);
  }
  .hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
    background: var(--bg); clip-path: ellipse(55% 100% at 50% 100%);
  }
  .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-top { display: flex; align-items: flex-start; gap: 28px; flex-wrap: wrap; padding-bottom: 40px; }
  .hero-logo {
    width: 96px; height: 96px; border-radius: 22px;
    background: white; display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    border: 3px solid rgba(255,255,255,0.4);
  }
  .hero-logo img { width: 80px; height: 80px; object-fit: contain; }
  .hero-logo.fallback { font-size: 2.8rem; font-weight: 800; color: var(--primary); }
  .hero-info { flex: 1; min-width: 0; }
  .hero-country-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 4px 12px; font-size: 0.78rem; font-weight: 600; margin-bottom: 10px;
    backdrop-filter: blur(10px);
  }
  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem; font-weight: 400; margin-bottom: 6px; line-height: 1.2;
  }
  .hero-location { font-size: 0.92rem; opacity: 0.8; margin-bottom: 16px; }
  .hero-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .hero-chip {
    background: rgba(255,255,255,0.18); border-radius: 20px;
    padding: 5px 14px; font-size: 0.8rem; font-weight: 600;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
  }
  .hero-chip.green { background: rgba(5,150,105,0.3); }
  .hero-chip.amber { background: rgba(217,119,6,0.3); }
  .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-hero-primary {
    padding: 11px 22px; background: white; color: var(--primary);
    border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 0.88rem; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-hero-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  .btn-hero-outline {
    padding: 11px 22px; background: transparent; color: white;
    border: 2px solid rgba(255,255,255,0.4); border-radius: 10px;
    font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif;
    font-size: 0.88rem; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-hero-outline:hover { background: rgba(255,255,255,0.1); }
  .btn-hero-add {
    padding: 11px 22px; background: rgba(255,255,255,0.15); color: white;
    border: 2px solid rgba(255,255,255,0.4); border-radius: 10px;
    font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif;
    font-size: 0.88rem; display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-hero-add:hover { background: rgba(255,255,255,0.25); }

  /* STAT BAR */
  .stat-bar {
    display: flex; gap: 0;
    background: rgba(255,255,255,0.12);
    border-radius: 14px 14px 0 0;
    overflow: hidden; backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2); border-bottom: none;
    margin-top: 32px;
  }
  .stat-bar-item {
    flex: 1; padding: 16px 20px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .stat-bar-item:last-child { border-right: none; }
  .stat-bar-value { font-size: 1.4rem; font-weight: 800; margin-bottom: 2px; }
  .stat-bar-label { font-size: 0.72rem; opacity: 0.75; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

  /* LAYOUT */
  .page-wrap { max-width: 1100px; margin: 0 auto; padding: 36px 5% 80px; }
  .grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* CARDS */
  .card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px;
    border: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  .card-title {
    font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .icon { font-size: 1.1rem; }

  /* ABOUT */
  .desc { color: var(--muted); line-height: 1.75; font-size: 0.91rem; }
  .about-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .about-meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--muted); }
  .about-meta-item strong { color: var(--text); font-weight: 600; }

  /* ACCEPTANCE METER */
  .acceptance-wrap { margin-bottom: 6px; }
  .acceptance-label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
  .acceptance-label span:first-child { color: var(--muted); }
  .acceptance-label span:last-child { font-weight: 700; color: var(--primary); }
  .meter-track { height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), #34d399); transition: width 1s ease; }
  .meter-fill.hard { background: linear-gradient(90deg, var(--red), #f87171); }
  .meter-fill.medium { background: linear-gradient(90deg, var(--amber), #fbbf24); }

  /* TUITION COMPARISON */
  .tuition-compare { display: flex; flex-direction: column; gap: 10px; }
  .tuition-row { display: flex; align-items: center; gap: 10px; }
  .tuition-row-label { font-size: 0.8rem; color: var(--muted); width: 100px; flex-shrink: 0; }
  .tuition-bar-wrap { flex: 1; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
  .tuition-bar { height: 100%; border-radius: 4px; background: var(--primary); }
  .tuition-bar.this { background: linear-gradient(90deg, var(--primary), var(--accent)); }
  .tuition-bar.avg { background: #93C5FD; }
  .tuition-val { font-size: 0.8rem; font-weight: 700; color: var(--text); width: 70px; text-align: right; }

  /* REQUIREMENTS */
  .req-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .req-list li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.88rem; color: var(--text); line-height: 1.5;
    padding: 10px 12px; background: var(--bg); border-radius: 10px;
  }
  .req-check { color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  /* SCHOLARSHIPS */
  .scholarship-card {
    border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .scholarship-card:last-child { margin-bottom: 0; }
  .scholarship-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
  .scholarship-elig { color: var(--muted); font-size: 0.79rem; }
  .scholarship-amount {
    color: var(--green); font-weight: 800; font-size: 0.95rem;
    background: #ECFDF5; padding: 4px 10px; border-radius: 8px; white-space: nowrap;
  }

  /* DEADLINES */
  .deadline-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-radius: 10px; margin-bottom: 8px;
    background: var(--bg);
  }
  .deadline-row:last-child { margin-bottom: 0; }
  .deadline-term { font-weight: 700; font-size: 0.88rem; }
  .deadline-type { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
  .deadline-date { color: var(--primary); font-weight: 700; font-size: 0.88rem; background: var(--primary-light); padding: 4px 10px; border-radius: 8px; }

  /* ALUMNI */
  .alumni-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .alumni-chip {
    background: linear-gradient(135deg, #F3F4F6, #E5E7EB);
    border-radius: 20px; padding: 7px 14px; font-size: 0.82rem; font-weight: 500;
    border: 1px solid var(--border);
  }

  /* PROGRAMS */
  .programs-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
  .prog-tag {
    background: var(--primary-light); color: var(--primary);
    border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; font-weight: 600;
    border: 1px solid rgba(37,99,235,0.15);
    transition: background 0.15s;
  }
  .prog-tag:hover { background: #DBEAFE; }

  /* PHOTOS */
  .photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .photos-grid img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }

  /* QUICK FACTS */
  .facts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fact-box {
    background: var(--bg); border-radius: 12px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .fact-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .fact-value { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
  .fact-sub { font-size: 0.75rem; color: var(--muted); }

  /* COUNTRY INFO */
  .country-flag { font-size: 2rem; margin-bottom: 10px; }
  .country-info-list { display: flex; flex-direction: column; gap: 8px; }
  .country-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.84rem; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .country-info-row:last-child { border-bottom: none; }
  .country-info-row span:first-child { color: var(--muted); }
  .country-info-row span:last-child { font-weight: 600; }

  /* CTA CARD */
  .cta-card {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
    color: white; text-align: center;
    box-shadow: 0 8px 24px rgba(37,99,235,0.3);
  }
  .cta-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .cta-card p { font-size: 0.82rem; opacity: 0.85; margin-bottom: 16px; line-height: 1.5; }
  .btn-cta-white {
    display: block; padding: 11px; background: white; color: var(--primary);
    border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 0.88rem;
    cursor: pointer; border: none; font-family: 'Sora', sans-serif; width: 100%;
    transition: transform 0.15s;
  }
  .btn-cta-white:hover { transform: translateY(-1px); }

  /* WEBSITE BTN */
  .website-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; text-align: center;
    background: var(--primary); color: white; border-radius: 10px;
    font-weight: 700; text-decoration: none; font-size: 0.88rem; margin-bottom: 10px;
    transition: background 0.15s;
  }
  .website-btn:hover { background: var(--primary-dark); }
  .website-btn-outline {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px; text-align: center;
    background: white; color: var(--primary); border-radius: 10px;
    font-weight: 600; text-decoration: none; font-size: 0.88rem;
    border: 1.5px solid var(--border); transition: border-color 0.15s;
  }
  .website-btn-outline:hover { border-color: var(--primary); }

  /* ENRICHMENT PENDING */
  .enrichment-pending {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 24px; text-align: center; margin-bottom: 20px;
    background: var(--bg);
  }
  .enrichment-pending .ep-icon { font-size: 2rem; margin-bottom: 8px; }
  .enrichment-pending h3 { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .enrichment-pending p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

  /* SIMILAR UNIS */
  .similar-uni {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: transform 0.15s;
  }
  .similar-uni:last-child { border-bottom: none; }
  .similar-uni:hover { transform: translateX(4px); }
  .similar-uni img { width: 36px; height: 36px; border-radius: 8px; object-fit: contain; background: var(--bg); }
  .similar-uni-name { font-size: 0.86rem; font-weight: 600; flex: 1; }
  .similar-uni-rank { font-size: 0.78rem; color: var(--primary); font-weight: 700; }

  /* MISC */
  .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 0.9rem; }
  .error { text-align: center; padding: 80px; color: var(--red); }
  .section-divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #111827; color: white; padding: 12px 24px; border-radius: 12px;
    font-size: 0.88rem; font-weight: 600; z-index: 999;
    transition: transform 0.3s ease; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">🌳 Univestree</a>
  <div class="nav-actions">
    <a href="universities.html" class="nav-back">← Back to Search</a>
    <button class="btn-track-nav" onclick="addToTracker()">📋 Track Application</button>
  </div>
</nav>

<div id="heroSection"><div style="height:64px;background:linear-gradient(135deg,#1e3a8a,#1D4ED8,#7C3AED);margin-top:64px"></div></div>
<div class="page-wrap">
  <div id="mainContent"><div class="loading">⏳ Loading university details...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDcip3y4gAC85mrs0T0ky9k4gy3f2PWBcI",
  authDomain: "univestree.firebaseapp.com",
  projectId: "univestree",
  storageBucket: "univestree.firebasestorage.app",
  messagingSenderId: "139818048792",
  appId: "1:139818048792:web:c9e273e0a15597d87b126d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const API = 'https://univestree-backend.vercel.app';

let currentUser = null;
let uniData = null;

onAuthStateChanged(auth, u => { currentUser = u; });

const COUNTRY_INFO = {
  'USA': { flag: '🇺🇸', currency: 'USD', language: 'English', visaType: 'F-1 Student Visa', avgTuition: 35000, workPermit: '20hrs/week on-campus' },
  'UK': { flag: '🇬🇧', currency: 'GBP', language: 'English', visaType: 'Student Visa (Tier 4)', avgTuition: 22000, workPermit: '20hrs/week' },
  'Canada': { flag: '🇨🇦', currency: 'CAD', language: 'English/French', visaType: 'Study Permit', avgTuition: 28000, workPermit: '20hrs/week' },
  'Australia': { flag: '🇦🇺', currency: 'AUD', language: 'English', visaType: 'Student Visa (500)', avgTuition: 30000, workPermit: '48hrs/fortnight' },
  'Germany': { flag: '🇩🇪', currency: 'EUR', language: 'German/English', visaType: 'National Visa (D)', avgTuition: 500, workPermit: '120 full days/year' },
  'France': { flag: '🇫🇷', currency: 'EUR', language: 'French', visaType: 'Long Stay Student Visa', avgTuition: 3000, workPermit: '964hrs/year' },
  'Singapore': { flag: '🇸🇬', currency: 'SGD', language: 'English', visaType: 'Student Pass', avgTuition: 20000, workPermit: '16hrs/week' },
  'Japan': { flag: '🇯🇵', currency: 'JPY', language: 'Japanese', visaType: 'College Student Visa', avgTuition: 8000, workPermit: '28hrs/week' },
  'Netherlands': { flag: '🇳🇱', currency: 'EUR', language: 'English/Dutch', visaType: 'MVV + Residence Permit', avgTuition: 12000, workPermit: '16hrs/week' },
  'Switzerland': { flag: '🇨🇭', currency: 'CHF', language: 'German/French', visaType: 'Residence Permit B', avgTuition: 1500, workPermit: '15hrs/week' },
};

const DEFAULT_REQS = {
  'USA': ['Academic transcripts (GPA 3.0+)', 'English proficiency (TOEFL/IELTS)', 'Letters of recommendation (2–3)', 'Statement of Purpose / Personal Essay', 'SAT/ACT scores (for UG)', 'GRE/GMAT (for PG programs)', 'Financial proof of funds'],
  'UK': ['Academic transcripts', 'IELTS 6.5+ or equivalent', 'Personal statement', 'Two academic references', 'UCAS application (for UG)', 'Financial evidence for visa'],
  'Canada': ['Academic transcripts', 'English proficiency (IELTS/TOEFL)', 'Statement of purpose', 'Two reference letters', 'Financial proof of funds', 'Study permit application'],
  'Australia': ['Academic transcripts', 'English test (IELTS 6.5+)', 'Statement of purpose', 'Genuine Temporary Entrant (GTE) statement', 'Financial capacity evidence', 'Health insurance (OSHC)'],
  'Germany': ['Academic transcripts (with certified translation)', 'German or English proficiency certificate', 'APS certificate (for Indian applicants)', 'Motivationsschreiben (motivation letter)', 'CV / Resume', 'Blocked account (€11,208/year)'],
  'DEFAULT': ['Academic transcripts', 'English proficiency certificate', 'Letters of recommendation', 'Statement of purpose', 'Valid passport', 'Financial proof of funds'],
};

function getReqs(country) {
  return DEFAULT_REQS[country] || DEFAULT_REQS['DEFAULT'];
}

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (!id) {
  document.getElementById('mainContent').innerHTML = '<div class="error">No university selected.</div>';
} else {
  loadUniversity(id);
}

async function loadUniversity(id) {
  try {
    const res = await fetch(`${API}/api/universities/${id}`);
    const u = await res.json();
    if (u.error) throw new Error(u.error);
    uniData = u;
    render(u);
    loadSimilar(u);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="error">Could not load university. <a href="universities.html">Go back</a></div>`;
  }
}

async function loadSimilar(u) {
  try {
    const res = await fetch(`${API}/api/universities/search?country=${encodeURIComponent(u.country)}&limit=6`);
    const data = await res.json();
    const unis = (data.universities || data).filter(x => x.id !== u.id).slice(0, 4);
    const el = document.getElementById('similarUnis');
    if (!el || !unis.length) return;
    el.innerHTML = unis.map(s => `
      <a class="similar-uni" href="university-details.html?id=${s.id}">
        <img src="${s.logo || `https://www.google.com/s2/favicons?domain=${s.website || s.name.replace(/ /g,'')}.edu&sz=64`}" onerror="this.src='https://via.placeholder.com/36'" />
        <span class="similar-uni-name">${s.name}</span>
        ${s.ranking ? `<span class="similar-uni-rank">#${s.ranking}</span>` : ''}
      </a>`).join('');
  } catch(e) {}
}

window.addToTracker = async () => {
  if (!currentUser) { showToast('Please log in to track applications 🔒'); return; }
  if (!uniData) return;
  try {
    const res = await fetch(`${API}/api/tracker/${currentUser.uid}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        universityId: uniData.id,
        universityName: uniData.name,
        logo: uniData.logo || '',
        country: uniData.country || '',
        deadline: '', notes: ''
      })
    });
    if (res.ok) showToast('✅ Added to your Application Tracker!');
    else showToast('Already in tracker or error occurred.');
  } catch(e) { showToast('Could not add to tracker.'); }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function render(u) {
  document.title = `${u.name} — Univestree`;
  const letter = u.name ? u.name[0] : '?';
  const tuition = u.tuition === 0 ? 'Free' : u.tuition ? `$${Number(u.tuition).toLocaleString()}/yr` : 'N/A';
  const tuitionNum = u.tuition || 0;
  const country = u.country || '';
  const countryInfo = COUNTRY_INFO[country] || null;

  const logoHTML = u.logo
    ? `<div class="hero-logo"><img src="${u.logo}" alt="${letter}" onerror="this.parentElement.className='hero-logo fallback';this.parentElement.innerHTML='${letter}'"></div>`
    : `<div class="hero-logo fallback">${letter}</div>`;

  const acceptRate = u.acceptanceRate;
  let rateLabel = '', rateClass = '';
  if (acceptRate <= 10) { rateLabel = 'Very Selective'; rateClass = 'hard'; }
  else if (acceptRate <= 30) { rateLabel = 'Selective'; rateClass = 'medium'; }
  else { rateLabel = 'Accessible'; rateClass = ''; }

  document.getElementById('heroSection').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-top">
          ${logoHTML}
          <div class="hero-info">
            <div class="hero-country-badge">${countryInfo ? countryInfo.flag : '🌍'} ${country}</div>
            <div class="hero-name">${u.name}</div>
            <div class="hero-location">📍 ${u.city ? u.city + ', ' : ''}${country}</div>
            <div class="hero-chips">
              ${u.ranking ? `<span class="hero-chip">🏆 Rank #${u.ranking}</span>` : ''}
              ${acceptRate ? `<span class="hero-chip ${acceptRate <= 10 ? 'amber' : ''}">${acceptRate <= 10 ? '🔥' : '✅'} ${acceptRate}% Acceptance</span>` : ''}
              <span class="hero-chip">${tuitionNum === 0 ? '🆓 Free Tuition' : `💰 ${tuition}`}</span>
              ${u.level ? `<span class="hero-chip">🎓 ${u.level}</span>` : ''}
            </div>
            <div class="hero-actions">
              ${u.website ? `<a href="https://${u.website}" target="_blank" class="btn-hero-primary">🌐 Visit Website</a>` : ''}
              <button class="btn-hero-add" onclick="addToTracker()">📋 Track This</button>
              <a href="universities.html" class="btn-hero-outline">← Back</a>
            </div>
          </div>
        </div>
        <div class="stat-bar">
          ${u.ranking ? `<div class="stat-bar-item"><div class="stat-bar-value">#${u.ranking}</div><div class="stat-bar-label">World Rank</div></div>` : ''}
          ${acceptRate ? `<div class="stat-bar-item"><div class="stat-bar-value">${acceptRate}%</div><div class="stat-bar-label">Acceptance</div></div>` : ''}
          <div class="stat-bar-item"><div class="stat-bar-value">${tuitionNum === 0 ? 'Free' : tuitionNum ? '$' + Math.round(tuitionNum/1000) + 'K' : 'N/A'}</div><div class="stat-bar-label">Annual Tuition</div></div>
          ${u.programs ? `<div class="stat-bar-item"><div class="stat-bar-value">${u.programs.length}+</div><div class="stat-bar-label">Programs</div></div>` : ''}
          ${countryInfo ? `<div class="stat-bar-item"><div class="stat-bar-value">${countryInfo.flag}</div><div class="stat-bar-label">${country}</div></div>` : ''}
        </div>
      </div>
    </div>`;

  // About text
  const aboutText = u.description
    ? u.description
    : `${u.name} is a ${u.level ? u.level.toLowerCase() + '-level ' : ''}institution located in ${u.city ? u.city + ', ' : ''}${country}.${u.ranking ? ` It holds a global ranking of #${u.ranking}, placing it among the world's leading universities.` : ''} ${acceptRate ? `With an acceptance rate of ${acceptRate}%, it is considered ${rateLabel.toLowerCase()}.` : ''} ${tuitionNum === 0 ? 'Tuition is free, making it an excellent choice for cost-conscious students.' : tuitionNum ? `Annual tuition stands at $${Number(tuitionNum).toLocaleString()}.` : ''} ${u.programs && u.programs.length ? `The university offers programs in ${u.programs.slice(0,3).join(', ')}${u.programs.length > 3 ? ', and more' : ''}.` : ''}`;

  // Admission requirements
  const reqs = u.admissionRequirements && u.admissionRequirements.length
    ? u.admissionRequirements
    : getReqs(country);

  // Tuition comparison
  const avgTuition = countryInfo ? countryInfo.avgTuition : 25000;
  const maxT = Math.max(tuitionNum, avgTuition, 10000);
  const tuitionSection = tuitionNum !== null && tuitionNum !== undefined ? `
    <div class="card">
      <div class="card-title"><span class="icon">💸</span>Tuition & Cost</div>
      <div class="tuition-compare">
        <div class="tuition-row">
          <span class="tuition-row-label">This university</span>
          <div class="tuition-bar-wrap"><div class="tuition-bar this" style="width:${tuitionNum === 0 ? 5 : Math.round((tuitionNum/maxT)*100)}%"></div></div>
          <span class="tuition-val">${tuitionNum === 0 ? '🆓 Free' : '$' + Math.round(tuitionNum/1000) + 'K'}</span>
        </div>
        ${countryInfo ? `<div class="tuition-row">
          <span class="tuition-row-label">${country} avg</span>
          <div class="tuition-bar-wrap"><div class="tuition-bar avg" style="width:${Math.round((avgTuition/maxT)*100)}%"></div></div>
          <span class="tuition-val">$${Math.round(avgTuition/1000)}K</span>
        </div>` : ''}
      </div>
      ${tuitionNum === 0 ? `<p style="font-size:0.82rem;color:var(--green);margin-top:12px;font-weight:600">🎉 This university offers tuition-free education!</p>` :
        tuitionNum < avgTuition ? `<p style="font-size:0.82rem;color:var(--green);margin-top:12px;font-weight:600">✅ Below the ${country} average — good value pick!</p>` :
        `<p style="font-size:0.82rem;color:var(--muted);margin-top:12px">Scholarships and financial aid may significantly reduce this cost.</p>`}
    </div>` : '';

  // Acceptance meter
  const acceptSection = acceptRate ? `
    <div class="card">
      <div class="card-title"><span class="icon">🎯</span>Selectivity</div>
      <div class="acceptance-wrap">
        <div class="acceptance-label"><span>Acceptance Rate</span><span>${acceptRate}% — ${rateLabel}</span></div>
        <div class="meter-track"><div class="meter-fill ${rateClass}" style="width:${Math.min(acceptRate, 100)}%"></div></div>
      </div>
      <p style="font-size:0.82rem;color:var(--muted);margin-top:12px;line-height:1.6">
        ${acceptRate <= 5 ? '🔥 Extremely competitive. Only the top applicants are admitted. A strong academic record, test scores, and compelling essays are essential.' :
          acceptRate <= 15 ? '⚡ Highly selective. Strong academics and extracurriculars required. Every component of your application matters.' :
          acceptRate <= 35 ? '📚 Selective. Above-average academics expected. A well-rounded application is key.' :
          '✅ Accessible. A solid academic record with good supporting materials should qualify most students.'}
      </p>
    </div>` : '';

  // Country info
  const countrySection = countryInfo ? `
    <div class="card">
      <div class="card-title"><span class="icon">🌍</span>Studying in ${country}</div>
      <div class="country-info-list">
        <div class="country-info-row"><span>Currency</span><span>${countryInfo.currency}</span></div>
        <div class="country-info-row"><span>Language</span><span>${countryInfo.language}</span></div>
        <div class="country-info-row"><span>Student Visa</span><span>${countryInfo.visaType}</span></div>
        <div class="country-info-row"><span>Work Permit</span><span>${countryInfo.workPermit}</span></div>
        <div class="country-info-row"><span>Avg. Tuition</span><span>$${countryInfo.avgTuition.toLocaleString()}/yr</span></div>
      </div>
    </div>` : '';

  // Enriched sections
  const photos = u.photos && u.photos.length
    ? `<div class="card"><div class="card-title"><span class="icon">📸</span>Campus Photos</div>
        <div class="photos-grid">${u.photos.slice(0,4).map(p => `<img src="${p.url}" alt="Campus" loading="lazy">`).join('')}</div>
       </div>` : '';

  const scholarships = u.scholarships && u.scholarships.length
    ? `<div class="card"><div class="card-title"><span class="icon">🎓</span>Scholarships & Funding</div>
        ${u.scholarships.map(s => `
          <div class="scholarship-card">
            <div><div class="scholarship-name">${s.name}</div><div class="scholarship-elig">${s.eligibility}</div></div>
            <div class="scholarship-amount">${s.amount}</div>
          </div>`).join('')}
       </div>`
    : `<div class="enrichment-pending">
        <div class="ep-icon">🎓</div>
        <h3>Scholarships Coming Soon</h3>
        <p>We're compiling scholarship data for ${u.name}. Check the official website for current funding opportunities.</p>
      </div>`;

  const deadlines = u.deadlines && u.deadlines.length
    ? `<div class="card"><div class="card-title"><span class="icon">📅</span>Application Deadlines</div>
        ${u.deadlines.map(d => `
          <div class="deadline-row">
            <div><div class="deadline-term">${d.term}</div><div class="deadline-type">${d.type}</div></div>
            <div class="deadline-date">${d.date}</div>
          </div>`).join('')}
       </div>`
    : `<div class="enrichment-pending">
        <div class="ep-icon">📅</div>
        <h3>Deadlines Coming Soon</h3>
        <p>Deadline data is being added. Visit the official website for current application dates.</p>
      </div>`;

  const alumni = u.notableAlumni && u.notableAlumni.length
    ? `<div class="card"><div class="card-title"><span class="icon">⭐</span>Notable Alumni</div>
        <div class="alumni-grid">${u.notableAlumni.map(a => `<span class="alumni-chip">${a}</span>`).join('')}</div>
       </div>` : '';

  const campusLife = u.campusLife
    ? `<div class="card"><div class="card-title"><span class="icon">🏠</span>Campus Life</div><p class="desc">${u.campusLife}</p></div>` : '';

  const research = u.researchAreas && u.researchAreas.length
    ? `<div class="card"><div class="card-title"><span class="icon">🔬</span>Research Areas</div>
        <div class="programs-wrap">${u.researchAreas.map(r => `<span class="prog-tag">${r}</span>`).join('')}</div>
       </div>` : '';

  document.getElementById('mainContent').innerHTML = `
    <div class="grid">
      <div>
        ${photos}
        <div class="card">
          <div class="card-title"><span class="icon">🏛️</span>About ${u.name}</div>
          <p class="desc">${aboutText}</p>
          <div class="about-meta">
            ${u.city ? `<div class="about-meta-item">📍 <strong>${u.city}</strong></div>` : ''}
            ${country ? `<div class="about-meta-item">🌍 <strong>${country}</strong></div>` : ''}
            ${u.level ? `<div class="about-meta-item">🎓 <strong>${u.level}</strong></div>` : ''}
            ${u.ranking ? `<div class="about-meta-item">🏆 <strong>Ranked #${u.ranking} globally</strong></div>` : ''}
          </div>
        </div>
        ${acceptSection}
        ${tuitionSection}
        <div class="card">
          <div class="card-title"><span class="icon">📋</span>Admission Requirements</div>
          <ul class="req-list">
            ${reqs.map(r => `<li><span class="req-check">✓</span>${r}</li>`).join('')}
          </ul>
          ${!u.admissionRequirements ? `<p style="font-size:0.78rem;color:var(--muted);margin-top:12px">* General requirements for ${country || 'international'} universities. Check the official website for exact requirements.</p>` : ''}
        </div>
        ${scholarships}
        ${deadlines}
        ${alumni}
        ${campusLife}
        ${research}
      </div>
      <div>
        <div class="cta-card">
          <h3>📋 Track Your Application</h3>
          <p>Add ${u.name} to your personal tracker. Stay on top of deadlines and application stages.</p>
          <button class="btn-cta-white" onclick="addToTracker()">+ Add to My Tracker</button>
        </div>

        <div class="card">
          <div class="card-title"><span class="icon">📊</span>Quick Facts</div>
          <div class="facts-grid">
            ${u.ranking ? `<div class="fact-box"><div class="fact-label">World Rank</div><div class="fact-value">#${u.ranking}</div></div>` : ''}
            ${acceptRate ? `<div class="fact-box"><div class="fact-label">Acceptance</div><div class="fact-value">${acceptRate}%</div><div class="fact-sub">${rateLabel}</div></div>` : ''}
            <div class="fact-box"><div class="fact-label">Tuition/yr</div><div class="fact-value">${tuitionNum === 0 ? 'Free' : tuitionNum ? '$' + Math.round(tuitionNum/1000) + 'K' : 'N/A'}</div></div>
            ${u.level ? `<div class="fact-box"><div class="fact-label">Level</div><div class="fact-value" style="font-size:0.85rem">${u.level.split(',')[0]}</div></div>` : ''}
          </div>
        </div>

        ${u.programs && u.programs.length ? `
          <div class="card">
            <div class="card-title"><span class="icon">📚</span>Programs Offered</div>
            <div class="programs-wrap">${u.programs.map(p => `<span class="prog-tag">${p}</span>`).join('')}</div>
          </div>` : ''}

        ${countrySection}

        ${u.website ? `
          <div class="card">
            <div class="card-title"><span class="icon">🔗</span>Official Links</div>
            <a href="https://${u.website}" target="_blank" class="website-btn">🌐 Official Website</a>
            <a href="https://${u.website}/admissions" target="_blank" class="website-btn-outline">🎓 Admissions Page</a>
          </div>` : ''}

        <div class="card">
          <div class="card-title"><span class="icon">🏫</span>Similar in ${country}</div>
          <div id="similarUnis"><div style="color:var(--muted);font-size:0.82rem">Loading...</div></div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
