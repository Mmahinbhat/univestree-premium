<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Waitlist — Uinvestree</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 460px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center; }
    .card h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 10px; }
    .card p.subtitle { color: #666; font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5; }
    input { width: 100%; padding: 12px 16px; border: 1.5px solid #dde1ea; border-radius: 8px; font-size: 0.95rem; margin-bottom: 14px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #4f46e5; }
    button { width: 100%; padding: 13px; background: #4f46e5; color: #fff; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #3730a3; }
    .msg { margin-top: 14px; font-size: 0.9rem; min-height: 20px; }
    .back { display: inline-block; margin-top: 24px; font-size: 0.85rem; color: #4f46e5; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌳 Join the Waitlist</h1>
    <p class="subtitle">Uinvestree is launching soon. Get early access to the smartest university discovery and application tracker.</p>
    <input type="text" id="wName" placeholder="Your full name" />
    <input type="email" id="wEmail" placeholder="Your email address" />
    <button onclick="joinWaitlist()">Get Early Access</button>
    <p class="msg" id="wMsg"></p>
    <a href="/" class="back">← Back to home</a>
  </div>
  <script>
  async function joinWaitlist() {
    const name = document.getElementById('wName').value.trim();
    const email = document.getElementById('wEmail').value.trim();
    const msg = document.getElementById('wMsg');
    if (!name || !email) { msg.style.color = '#e74c3c'; msg.textContent = 'Please enter your name and email.'; return; }
    try {
      const res = await fetch('https://univestree-backend.vercel.app/api/waitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email })
      });
      const data = await res.json();
      if (res.ok) {
        msg.style.color = '#27ae60';
        msg.textContent = "🎉 You're on the list! We'll be in touch.";
        document.getElementById('wName').value = '';
        document.getElementById('wEmail').value = '';
      } else {
        msg.style.color = '#e74c3c';
        msg.textContent = data.error || 'Something went wrong.';
      }
    } catch (err) {
      msg.style.color = '#e74c3c';
      msg.textContent = 'Network error. Please try again.';
    }
  }
  </script>
</body>
</html>
